name: Release Module

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip module files
        run: zip -r speaking-status.zip module.json speaking-status.js LICENSE README.md

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            speaking-status.zip
